<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>NoteMind</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 340px; font-family: 'Segoe UI', sans-serif; background: #0f0f13; color: #f0ece4; }

.hdr { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.08); }
.logo { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,#FF6B35,#EF476F); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:#fff; flex-shrink:0; }
.hdr h1 { font-size:13px; font-weight:700; }
.hdr p  { font-size:10px; color:#555; margin-top:1px; }

.body { padding:13px 14px; display:flex; flex-direction:column; gap:10px; }

.quick { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.25); border-radius:10px; padding:10px 12px; display:none; }
.quick-lbl { font-size:10px; color:#34d399; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.quick-pre { font-size:11px; color:#86efac; line-height:1.4; margin-bottom:8px; font-style:italic; }
.btn-q { width:100%; padding:9px; border-radius:8px; border:none; background:#10b981; color:#fff; font-size:12px; font-weight:700; cursor:pointer; }
.btn-q:disabled { opacity:.5; cursor:not-allowed; }

.sep { text-align:center; font-size:10px; color:#252535; display:none; }

label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:3px; }
.tok-ok { color:#34d399; font-size:10px; margin-left:4px; }

input, textarea { width:100%; background:#1a1a24; border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#f0ece4; font-size:12px; padding:8px 10px; outline:none; font-family:inherit; transition:border-color .2s; }
input:focus, textarea:focus { border-color:#FF6B35; }
textarea { resize:vertical; min-height:80px; max-height:130px; line-height:1.5; }

.row { display:flex; gap:6px; }
.row input { flex:1; }
.btn-sm { padding:0 10px; border-radius:7px; border:1px solid rgba(255,255,255,0.1); background:#1d1d28; color:#666; font-size:11px; cursor:pointer; }

.hint { font-size:10px; color:#2e2e42; margin-top:3px; line-height:1.5; }

.btn-save { width:100%; padding:10px; border-radius:9px; border:none; background:linear-gradient(135deg,#FF6B35,#EF476F); color:#fff; font-size:13px; font-weight:700; cursor:pointer; }
.btn-save:disabled { opacity:.5; cursor:not-allowed; }

.status { font-size:12px; padding:8px 10px; border-radius:8px; text-align:center; display:none; }
.status.ok  { background:rgba(16,185,129,.12); color:#34d399; display:block; }
.status.err { background:rgba(239,68,68,.12);  color:#f87171; display:block; }
.status.loading { background:rgba(255,107,53,.1); color:#FF6B35; display:block; }

.footer { font-size:10px; color:#1e1e2e; text-align:center; padding:2px 0 8px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">N</div>
  <div>
    <h1>NoteMind Web Clipper</h1>
    <p>Save pages to your knowledge base</p>
  </div>
</div>

<div class="body">

  <div class="quick" id="qbox">
    <div class="quick-lbl">⚡ Text Selected</div>
    <div class="quick-pre" id="qpre"></div>
    <button class="btn-q" id="qbtn">Save Selected Text Now</button>
  </div>
  <div class="sep" id="sep">── or save full page ──</div>

  <div>
    <label>Auth Token <span class="tok-ok" id="tokOk"></span></label>
    <div class="row">
      <input type="password" id="tok" placeholder="Paste notemind_token…"/>
      <button class="btn-sm" id="clrBtn">Clear</button>
    </div>
    <div class="hint">NoteMind app → F12 → Application → Local Storage → <b>notemind_token</b></div>
  </div>

  <div>
    <label>Title</label>
    <input type="text" id="ttl" placeholder="Loading…"/>
  </div>

  <div>
    <label>Tag</label>
    <input type="text" id="tag" value="web"/>
  </div>

  <div>
    <label>Content</label>
    <textarea id="cnt" placeholder="Loading page content…"></textarea>
  </div>

  <div class="status" id="st"></div>

  <button class="btn-save" id="saveBtn">Save to NoteMind</button>
  <div class="footer">Backend: 127.0.0.1:8000</div>
</div>

<script src="popup.js"></script>
</body>
</html>
